name: Build Release Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build-test:
    uses: ./.github/workflows/package-build.yml
    with:
      cloudsmith_dest: release
      packagecloud_repo: asbru-cm
    secrets:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
      PACKAGECLOUD_USER: ${{ secrets.PACKAGECLOUD_USER }}
      PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

  build-appimage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build AppImage Docker image
        run: docker build --tag=asbru-cm-appimage-maker --file=dist/appimage/Dockerfile .

      - name: Run AppImage builder
        run: |
          CIDFILE=$(mktemp -u)
          docker run --cidfile "$CIDFILE" --privileged=true -i asbru-cm-appimage-maker /bin/bash \
            < dist/appimage/container_make_appimage.sh
          docker cp "$(cat "$CIDFILE"):/Asbru-CM.AppImage" "Asbru-CM-${{ github.ref_name }}.AppImage"
          docker rm "$(cat "$CIDFILE")"
          chmod a+x "Asbru-CM-${{ github.ref_name }}.AppImage"

      - name: Attach AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "Asbru-CM-${{ github.ref_name }}.AppImage"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
